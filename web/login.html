<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 · deltascope</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="login">

<div class="login-wrap">
  <div class="login-card">
    <div class="brand login-brand">
      <span class="brand-mark">Δ</span>
      <span class="brand-name">deltascope</span>
    </div>
    <p class="login-sub">单机性能倒退体检台 · 本地认证</p>
    <form id="loginForm" autocomplete="off">
      <label>用户名
        <input type="text" id="username" autocomplete="username" required autofocus>
      </label>
      <label>密码
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <div class="notice hidden" id="loginError"></div>
      <button class="btn btn-primary btn-block" type="submit">登录</button>
    </form>
    <p class="login-foot">凭证仅存于本机,不与任何外部服务通信</p>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
