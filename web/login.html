<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · deltascope</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="login">

<div class="login-wrap">
  <div class="login-card">
    <div class="brand login-brand">
      <span class="brand-mark">Δ</span>
      <span class="brand-name">deltascope</span>
    </div>
    <p class="login-sub">Whole-machine change &amp; performance diagnostics · local auth</p>
    <form id="loginForm" autocomplete="off">
      <label>Username
        <input type="text" id="username" autocomplete="username" required autofocus>
      </label>
      <label>Password
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <div class="notice hidden" id="loginError"></div>
      <button class="btn btn-primary btn-block" type="submit">Sign in</button>
    </form>
    <p class="login-foot">Credentials are stored locally only; nothing is sent to any external service</p>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
