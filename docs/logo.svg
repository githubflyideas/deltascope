<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="ab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4cc9f0"/>
      <stop offset="1" stop-color="#e8a33d"/>
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0H0V14" fill="none" stroke="#7a98d2" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="22" fill="#0d1322"/>
  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#grid)"/>
  <rect x="4" y="4" width="120" height="120" rx="22" fill="none" stroke="#263354" stroke-width="2"/>
  <!-- Δ -->
  <path d="M64 26 L100 96 H28 Z" fill="none" stroke="url(#ab)" stroke-width="9" stroke-linejoin="round"/>
